<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Converse AI Promptathon 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-void: #0a0a1a;
  --bg-card: rgba(255,255,255,0.035);
  --bg-card-hover: rgba(255,255,255,0.06);
  --text-primary: #f0f0f8;
  --text-secondary: rgba(240,240,248,0.6);
  --text-muted: rgba(240,240,248,0.32);
  --border: rgba(255,255,255,0.07);
  --accent: #7c6cf0;
  --accent-rgb: 124,108,240;
  --accent-glow: rgba(124,108,240,0.3);
  --accent-secondary: #00d2c6;
  --accent-sec-rgb: 0,210,198;
  --hero-grad-2: #a29bfe;
  --hero-grad-3: #00d2c6;
  --hero-grad-4: #f093fb;
  --ripple-color: var(--accent-rgb);
  --ripple-max-size: 500px;
  --ripple-duration: 1.4s;
  --font-sans: 'Inter', 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
  --ease-out-expo: cubic-bezier(0.16,1,0.3,1);
  --ease-out-quart: cubic-bezier(0.25,1,0.5,1);
  --ease-in-out: cubic-bezier(0.76,0,0.24,1);
  --dur-fast: 0.3s;
  --dur-norm: 0.6s;
  --dur-slow: 1s;
}

html, body {
  height: 100%;
  overflow: hidden;
  font-family: var(--font-sans);
  background: var(--bg-void);
  color: var(--text-primary);
  -webkit-font-smoothing: antialiased;
}

/* ============================================
   FULL-PAGE CONTAINER + ANIMATED GRADIENT
   ============================================ */
.page {
  position: relative;
  width: 100%;
  height: 100vh;
  overflow: hidden;
  cursor: default;
  background:
    radial-gradient(ellipse 90% 70% at 8% 92%, rgba(0,210,198,0.15) 0%, transparent 50%),
    radial-gradient(ellipse 80% 80% at 88% 12%, rgba(124,108,240,0.2) 0%, transparent 45%),
    radial-gradient(ellipse 70% 60% at 50% 50%, rgba(240,147,251,0.1) 0%, transparent 50%),
    radial-gradient(ellipse 80% 70% at 85% 85%, rgba(225,112,85,0.08) 0%, transparent 45%),
    linear-gradient(145deg, #060616 0%, #0c0a2a 20%, #091525 45%, #0f082a 70%, #080818 100%);
}

.page::before {
  content: '';
  position: absolute; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 60% 50% at 20% 20%, rgba(124,108,240,0.14) 0%, transparent 60%),
    radial-gradient(ellipse 50% 60% at 80% 70%, rgba(0,210,198,0.12) 0%, transparent 55%),
    radial-gradient(ellipse 40% 40% at 60% 30%, rgba(240,147,251,0.08) 0%, transparent 50%),
    radial-gradient(ellipse 50% 50% at 30% 80%, rgba(225,112,85,0.08) 0%, transparent 50%);
  animation: gradientShift 20s ease-in-out infinite alternate;
  pointer-events: none;
}

@keyframes gradientShift {
  0%   { opacity: 1; transform: scale(1) translate(0, 0); }
  33%  { opacity: 0.85; transform: scale(1.05) translate(2%, -2%); }
  66%  { opacity: 0.95; transform: scale(0.98) translate(-1%, 2%); }
  100% { opacity: 1; transform: scale(1.03) translate(1%, -1%); }
}

/* ============================================
   AI CANVAS — full-screen neural mesh
   ============================================ */
.bg-canvas {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  z-index: 1; pointer-events: none; display: block;
}

/* Cursor light */
.cursor-light {
  position: absolute; width: 420px; height: 420px; border-radius: 50%;
  pointer-events: none; z-index: 5;
  background: radial-gradient(circle, rgba(var(--accent-rgb),0.08) 0%, rgba(var(--accent-sec-rgb),0.04) 40%, transparent 70%);
  will-change: transform; opacity: 0; transition: opacity 0.6s ease;
}
.cursor-light.--on { opacity: 1; }

/* Ripple layer */
.ripple-layer { position: absolute; inset: 0; z-index: 6; pointer-events: none; overflow: hidden; }

.ripple-bubble {
  position: absolute; border-radius: 50%; pointer-events: none;
  transform: translate(-50%,-50%) scale(0);
  will-change: transform, opacity;
  animation: rippleExpand var(--ripple-duration) cubic-bezier(0.16,1,0.3,1) forwards;
}
.ripple-bubble--ring {
  border: 1.5px solid rgba(var(--ripple-color),0.35);
  box-shadow: 0 0 35px rgba(var(--ripple-color),0.1), inset 0 0 35px rgba(var(--ripple-color),0.03);
}
.ripple-bubble--glow {
  background: radial-gradient(circle, rgba(var(--ripple-color),0.08) 0%, transparent 70%);
  filter: blur(10px);
}
.ripple-bubble--core {
  background: radial-gradient(circle, rgba(var(--ripple-color),0.25) 0%, transparent 50%);
  filter: blur(3px); width: 24px !important; height: 24px !important;
  animation: rippleCore 0.6s cubic-bezier(0.16,1,0.3,1) forwards;
}

@keyframes rippleExpand {
  0%  { transform: translate(-50%,-50%) scale(0); opacity: 1; }
  60% { opacity: 0.5; }
  100%{ transform: translate(-50%,-50%) scale(1); opacity: 0; }
}
@keyframes rippleCore {
  0%  { transform: translate(-50%,-50%) scale(1); opacity: 1; }
  100%{ transform: translate(-50%,-50%) scale(3); opacity: 0; }
}

/* ============================================
   PROGRESS BAR (top)
   ============================================ */
.progress-bar {
  position: absolute; top: 0; left: 0; right: 0; height: 3px; z-index: 50;
  background: rgba(255,255,255,0.05);
  opacity: 0; transition: opacity 0.5s ease;
  border-radius: 0 0 2px 2px;
}
.progress-bar.--show { opacity: 1; }
.progress-bar__fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent-secondary));
  width: 0%; transition: width 0.8s var(--ease-out-expo);
  border-radius: 0 2px 2px 0;
  box-shadow: 0 0 18px var(--accent-glow);
}

/* ============================================
   CONTENT AREA (centered, shared by hero & steps)
   ============================================ */
.stage {
  position: relative; z-index: 10;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  width: 100%; height: 100%;
  padding: 3rem 2.5rem 2rem;
}

/* ============================================
   VIEW: HERO (intro screen)
   ============================================ */
.view-hero {
  position: absolute; inset: 0; z-index: 12;
  display: flex; align-items: center; justify-content: center;
  text-align: center;
  padding: 2rem;
  transition: opacity 0.6s var(--ease-out-expo), transform 0.6s var(--ease-out-expo);
  perspective: 1200px;
}
.view-hero.--hidden {
  opacity: 0;
  transform: scale(0.97) translateY(-20px);
  pointer-events: none;
}

/* Aurora blobs — morphing background */
.hero-aurora {
  position: absolute; inset: 0; z-index: 0; pointer-events: none;
  overflow: hidden; filter: blur(80px);
}
.hero-aurora__blob {
  position: absolute; border-radius: 50%;
  will-change: transform, border-radius;
}
.hero-aurora__blob:nth-child(1) {
  width: 45vw; height: 45vw; top: 10%; left: 10%;
  background: rgba(124,108,240,0.12);
  animation: auroraA 14s ease-in-out infinite alternate;
}
.hero-aurora__blob:nth-child(2) {
  width: 40vw; height: 40vw; bottom: 5%; right: 8%;
  background: rgba(0,210,198,0.1);
  animation: auroraB 16s ease-in-out infinite alternate;
}
.hero-aurora__blob:nth-child(3) {
  width: 30vw; height: 30vw; top: 40%; left: 50%;
  background: rgba(240,147,251,0.08);
  animation: auroraC 18s ease-in-out infinite alternate;
}
@keyframes auroraA {
  0%   { transform: translate(0,0) scale(1); border-radius: 40% 60% 55% 45%; }
  33%  { transform: translate(5vw,3vh) scale(1.15); border-radius: 55% 45% 40% 60%; }
  66%  { transform: translate(-3vw,5vh) scale(0.95); border-radius: 45% 55% 60% 40%; }
  100% { transform: translate(2vw,-2vh) scale(1.1); border-radius: 60% 40% 45% 55%; }
}
@keyframes auroraB {
  0%   { transform: translate(0,0) scale(1); border-radius: 50% 50% 45% 55%; }
  50%  { transform: translate(-6vw,-4vh) scale(1.2); border-radius: 40% 60% 55% 45%; }
  100% { transform: translate(3vw,5vh) scale(0.9); border-radius: 55% 45% 60% 40%; }
}
@keyframes auroraC {
  0%   { transform: translate(0,0) scale(1); border-radius: 45% 55% 50% 50%; }
  50%  { transform: translate(4vw,-6vh) scale(1.1); border-radius: 60% 40% 45% 55%; }
  100% { transform: translate(-5vw,3vh) scale(1.05); border-radius: 50% 50% 55% 45%; }
}

/* Orbit rings behind hero */
.hero-orbits {
  position: absolute; top: 50%; left: 50%;
  width: min(560px, 65vw); height: min(560px, 65vw);
  transform: translate(-50%, -50%);
  pointer-events: none; z-index: 0;
}
.hero-orbits__ring {
  position: absolute; inset: 0; border-radius: 50%;
  border: 1px solid rgba(var(--accent-rgb), 0.06);
}
.hero-orbits__ring:nth-child(1) { animation: orbitSpin 45s linear infinite; }
.hero-orbits__ring:nth-child(2) { inset: 14%; border-color: rgba(var(--accent-sec-rgb), 0.05); animation: orbitSpin 35s linear infinite reverse; }
.hero-orbits__ring:nth-child(3) { inset: 30%; border-color: rgba(240,147,251,0.04); animation: orbitSpin 28s linear infinite; }

.hero-orbits__dot {
  position: absolute; width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 16px rgba(var(--accent-rgb), 0.6), 0 0 40px rgba(var(--accent-rgb), 0.2);
  top: -4px; left: 50%; margin-left: -4px;
}
.hero-orbits__ring:nth-child(2) .hero-orbits__dot {
  background: var(--accent-secondary);
  box-shadow: 0 0 16px rgba(var(--accent-sec-rgb), 0.6), 0 0 40px rgba(var(--accent-sec-rgb), 0.2);
  width: 6px; height: 6px; top: -3px; margin-left: -3px;
}
@keyframes orbitSpin { to { transform: rotate(360deg); } }

.hero-inner {
  max-width: 960px; position: relative; z-index: 2;
  display: flex; flex-direction: column; align-items: center; gap: 0;
  will-change: transform;
  transform-style: preserve-3d;
}

/* Badge */
.hero-badge {
  display: inline-flex; align-items: center; gap: 0.6rem;
  padding: 0.55rem 1.5rem 0.55rem 1rem; border-radius: 100px;
  background: rgba(var(--accent-rgb),0.06);
  border: 1px solid rgba(var(--accent-rgb),0.2);
  font-family: var(--font-mono); font-size: 0.72rem;
  letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent);
  margin-bottom: 2.2rem;
  opacity: 0; transform: translateY(18px) scale(0.95); filter: blur(6px);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  transition: opacity 0.8s var(--ease-out-expo), transform 0.8s var(--ease-out-expo),
              filter 0.8s var(--ease-out-expo),
              box-shadow 0.4s ease, border-color 0.4s ease, background 0.4s ease;
  position: relative; overflow: hidden;
}
.hero-badge.--in { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
.hero-badge:hover {
  border-color: rgba(var(--accent-rgb),0.4);
  box-shadow: 0 4px 30px rgba(var(--accent-rgb),0.2);
  background: rgba(var(--accent-rgb),0.1);
}
.hero-badge::after {
  content: ''; position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(var(--accent-rgb),0.1), transparent);
  animation: badgeShimmer 4s ease-in-out infinite;
}
@keyframes badgeShimmer { 0%,100% { left: -100%; } 50% { left: 150%; } }

.hero-badge__dot {
  width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
  box-shadow: 0 0 12px var(--accent-glow);
  animation: pulse 2.5s ease-in-out infinite;
}
@keyframes pulse {
  0%,100%{ transform: scale(1); opacity: 1; }
  50%    { transform: scale(1.35); opacity: 0.5; }
}

/* Title — animated gradient border wrapper */
.hero-title-wrap {
  position: relative; padding: 0.4rem 1.8rem; margin-bottom: 1.8rem;
}
.hero-title-border {
  position: absolute; inset: 0; border-radius: 16px; padding: 1.5px;
  background: conic-gradient(from var(--border-angle,0deg), var(--accent), var(--accent-secondary), rgba(240,147,251,0.6), var(--accent));
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude;
  animation: borderRotate 4s linear infinite;
  opacity: 0; transition: opacity 1.2s var(--ease-out-expo);
  pointer-events: none;
}
.hero-title-border.--in { opacity: 0.7; }
@keyframes borderRotate { to { --border-angle: 360deg; } }
@property --border-angle { syntax: '<angle>'; initial-value: 0deg; inherits: false; }

/* Title text */
.hero-title {
  font-size: clamp(1.3rem, 4.5vw, 4rem);
  font-weight: 800; line-height: 1.15; letter-spacing: -0.035em;
  position: relative; cursor: default;
  white-space: nowrap;
}

.hero-title__line { display: block; overflow: hidden; padding-bottom: 0.08em; }

.hero-title .char {
  display: inline-block;
  opacity: 0; transform: translateY(100%) scale(0.9); filter: blur(4px);
  transform-origin: center bottom;
  transition: opacity 0.5s var(--ease-out-expo), transform 0.5s var(--ease-out-expo), filter 0.5s var(--ease-out-expo);
  background: linear-gradient(180deg, #ffffff 0%, rgba(240,240,248,0.85) 100%);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 12px rgba(var(--accent-rgb),0.15)) blur(4px);
}
.hero-title .char.--in {
  opacity: 1; transform: translateY(0) scale(1); filter: drop-shadow(0 0 12px rgba(var(--accent-rgb),0.15)) blur(0);
}
.hero-title .char.--in:hover {
  background: linear-gradient(180deg, var(--accent) 0%, var(--accent-secondary) 100%);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 20px rgba(var(--accent-rgb),0.5)) blur(0);
  transition: all 0.3s ease;
}

/* Typing cursor at end of title */
.hero-cursor {
  display: inline-block; width: 3px; height: 0.85em;
  background: var(--accent); margin-left: 4px; vertical-align: baseline;
  opacity: 0; border-radius: 2px;
  box-shadow: 0 0 12px rgba(var(--accent-rgb),0.5);
}
.hero-cursor.--blink {
  animation: cursorBlink 0.8s step-end infinite;
}
.hero-cursor.--off { animation: none; opacity: 0; transition: opacity 0.5s ease; }
@keyframes cursorBlink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

/* Title shimmer sweep */
.hero-title-shimmer {
  position: absolute; inset: 0; pointer-events: none;
  background: linear-gradient(105deg,
    transparent 30%, rgba(255,255,255,0.12) 45%, rgba(255,255,255,0.25) 50%, rgba(255,255,255,0.12) 55%, transparent 70%);
  background-size: 250% 100%;
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
  opacity: 0;
}
.hero-title-shimmer.--sweep {
  opacity: 1;
  animation: shimmerSweep 1.2s cubic-bezier(0.25,0.46,0.45,0.94) forwards;
}
@keyframes shimmerSweep {
  0%   { background-position: 150% center; }
  100% { background-position: -50% center; }
}

/* AI Scan line */
.hero-scanline {
  position: absolute; left: 0; right: 0; height: 2px; top: 0;
  background: linear-gradient(90deg, transparent, rgba(var(--accent-rgb),0.4), rgba(var(--accent-sec-rgb),0.3), transparent);
  box-shadow: 0 0 20px rgba(var(--accent-rgb),0.3), 0 0 60px rgba(var(--accent-rgb),0.1);
  pointer-events: none; z-index: 1;
  opacity: 0;
}
.hero-scanline.--go {
  opacity: 1;
  animation: scanDown 3s cubic-bezier(0.22,0.61,0.36,1) forwards;
}
@keyframes scanDown {
  0%   { top: 0; opacity: 0; }
  5%   { opacity: 1; }
  90%  { opacity: 0.6; }
  100% { top: 100%; opacity: 0; }
}

/* Floating sparkle particles */
.hero-sparkles {
  position: absolute; inset: 0; pointer-events: none; z-index: 1; overflow: hidden;
}
.hero-sparkle {
  position: absolute; width: 3px; height: 3px; border-radius: 50%;
  background: rgba(var(--accent-rgb), 0.6);
  box-shadow: 0 0 6px rgba(var(--accent-rgb), 0.4);
  animation: sparkleFloat var(--dur) linear infinite;
  opacity: 0;
}
.hero-sparkle:nth-child(odd) {
  background: rgba(var(--accent-sec-rgb), 0.5);
  box-shadow: 0 0 6px rgba(var(--accent-sec-rgb), 0.3);
  width: 2px; height: 2px;
}
@keyframes sparkleFloat {
  0%   { transform: translateY(0) scale(0); opacity: 0; }
  10%  { opacity: 1; transform: translateY(-10vh) scale(1); }
  90%  { opacity: 0.6; }
  100% { transform: translateY(-100vh) scale(0.3); opacity: 0; }
}

/* Noise / grain overlay */
.hero-noise {
  position: absolute; inset: 0; z-index: 1; pointer-events: none;
  opacity: 0.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-repeat: repeat;
  background-size: 180px 180px;
  mix-blend-mode: overlay;
}

/* Circuit decoration lines (bottom-left) */
.hero-circuits {
  position: absolute; bottom: 2.5rem; left: 2.5rem; z-index: 1;
  width: 120px; height: 80px; pointer-events: none;
  opacity: 0; transition: opacity 1.5s var(--ease-out-expo);
}
.hero-circuits.--in { opacity: 0.25; }
.hero-circuits__line {
  position: absolute; background: rgba(var(--accent-rgb), 0.3);
  border-radius: 1px;
}
.hero-circuits__line:nth-child(1) { bottom: 0; left: 0; width: 80px; height: 1px; }
.hero-circuits__line:nth-child(2) { bottom: 0; left: 80px; width: 1px; height: 35px; }
.hero-circuits__line:nth-child(3) { bottom: 35px; left: 80px; width: 30px; height: 1px; }
.hero-circuits__line:nth-child(4) { bottom: 35px; left: 110px; width: 1px; height: 25px; }
.hero-circuits__line:nth-child(5) { bottom: 15px; left: 20px; width: 1px; height: 25px; }
.hero-circuits__line:nth-child(6) { bottom: 40px; left: 20px; width: 40px; height: 1px; }
.hero-circuits__node {
  position: absolute; width: 5px; height: 5px; border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 8px rgba(var(--accent-rgb), 0.5);
  animation: pulse 3s ease-in-out infinite;
}
.hero-circuits__node:nth-child(7) { bottom: -2px; left: -2px; }
.hero-circuits__node:nth-child(8) { bottom: 33px; left: 78px; animation-delay: 0.8s; }
.hero-circuits__node:nth-child(9) { bottom: 58px; left: 108px; animation-delay: 1.6s; }
.hero-circuits__node:nth-child(10) { bottom: 38px; left: 18px; animation-delay: 0.4s; }

/* Subtitle */
.hero-sub {
  font-size: clamp(1rem, 1.6vw, 1.2rem); font-weight: 400;
  color: var(--text-secondary); line-height: 1.8;
  max-width: 680px; text-align: center; margin-bottom: 1.2rem;
  opacity: 0; transform: translateY(20px) scale(0.98); filter: blur(6px);
  transition: opacity 1s var(--ease-out-expo), transform 1s var(--ease-out-expo), filter 0.8s var(--ease-out-expo);
}
.hero-sub.--in { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
.hero-sub em {
  font-style: normal; font-weight: 600;
  background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* Separator line */
.hero-sep {
  width: 60px; height: 2px; margin: 0 auto 1.6rem;
  background: linear-gradient(90deg, transparent, var(--accent), var(--accent-secondary), transparent);
  border-radius: 2px;
  opacity: 0; transform: scaleX(0);
  transition: opacity 0.8s var(--ease-out-expo), transform 0.8s var(--ease-out-expo);
}
.hero-sep.--in { opacity: 0.6; transform: scaleX(1); }

/* Team members — bottom-right glassmorphism card */
.hero-team {
  position: absolute; bottom: 2rem; right: 2.5rem;
  display: flex; flex-direction: column; align-items: flex-start; gap: 0.55rem;
  padding: 1rem 1.5rem 0.9rem;
  background: rgba(255,255,255,0.025);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(var(--accent-rgb),0.1);
  border-radius: 14px;
  opacity: 0; transform: translateY(12px) scale(0.97); filter: blur(4px);
  transition: opacity 0.9s var(--ease-out-expo), transform 0.9s var(--ease-out-expo), filter 0.8s var(--ease-out-expo),
              border-color 0.3s ease, box-shadow 0.3s ease;
  z-index: 3;
  box-shadow: 0 4px 30px rgba(0,0,0,0.18), inset 0 0 0 1px rgba(255,255,255,0.02);
  border-left: 2px solid rgba(var(--accent-rgb), 0.35);
}
.hero-team.--in { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
.hero-team:hover {
  border-color: rgba(var(--accent-rgb),0.25);
  box-shadow: 0 8px 40px rgba(0,0,0,0.22), 0 0 40px rgba(var(--accent-rgb),0.07);
  background: rgba(255,255,255,0.04);
}
.hero-team__label {
  font-family: var(--font-mono); font-size: 0.6rem;
  letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--accent); font-weight: 600;
  padding-bottom: 0.4rem;
  border-bottom: 1px solid rgba(var(--accent-rgb),0.1);
  width: 100%;
  filter: drop-shadow(0 0 6px rgba(var(--accent-rgb),0.3));
}
.hero-team__list {
  list-style: none; margin: 0; padding: 0;
  display: flex; flex-direction: column; align-items: flex-start; gap: 0.4rem;
}
.hero-team__name {
  font-size: 1.05rem; font-weight: 600; letter-spacing: 0.025em;
  padding-left: 1.3rem; position: relative;
  color: rgba(240,240,248,0.9);
  opacity: 0; transform: translateX(10px);
  transition: opacity 0.6s var(--ease-out-expo), transform 0.6s var(--ease-out-expo), color 0.3s ease, filter 0.3s ease;
}
.hero-team__name.--in { opacity: 1; transform: translateX(0); }
.hero-team__name:hover {
  color: #fff;
  filter: drop-shadow(0 0 10px rgba(var(--accent-rgb),0.4));
}
.hero-team__name::before {
  content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%);
  width: 7px; height: 7px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
  box-shadow: 0 0 10px rgba(var(--accent-rgb),0.5);
  animation: pulse 3s ease-in-out infinite;
}

/* CTA */
.hero-cta {
  display: inline-flex; align-items: center; gap: 0.8rem;
  padding: 1.05rem 3rem; font-size: 1.08rem; font-weight: 600;
  font-family: var(--font-sans); color: #fff;
  background: linear-gradient(135deg, var(--accent), #9585f7);
  border: 1px solid rgba(255,255,255,0.12); border-radius: 16px;
  cursor: pointer; position: relative; overflow: hidden; outline: none;
  box-shadow: 0 4px 30px rgba(var(--accent-rgb),0.35), 0 0 80px rgba(var(--accent-rgb),0.08),
              inset 0 1px 0 rgba(255,255,255,0.12);
  opacity: 0; transform: translateY(16px) scale(0.97); filter: blur(4px);
  transition: opacity 0.8s var(--ease-out-expo), transform 0.8s var(--ease-out-expo), filter 0.6s var(--ease-out-expo),
              box-shadow 0.35s var(--ease-out-expo);
}
.hero-cta.--in { opacity: 1; transform: translateY(0) scale(1); filter: blur(0);
  animation: ctaBreath 3s ease-in-out 1.5s infinite alternate;
}
@keyframes ctaBreath {
  0%   { box-shadow: 0 4px 30px rgba(var(--accent-rgb),0.35), 0 0 60px rgba(var(--accent-rgb),0.06); }
  100% { box-shadow: 0 4px 40px rgba(var(--accent-rgb),0.5), 0 0 100px rgba(var(--accent-rgb),0.12); }
}
.hero-cta:hover {
  animation: none;
  transform: translateY(-3px) scale(1.04);
  box-shadow: 0 10px 50px rgba(var(--accent-rgb),0.5), 0 0 120px rgba(var(--accent-rgb),0.12);
}
.hero-cta:active { transform: translateY(0) scale(0.98); }
.hero-cta::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, transparent, rgba(255,255,255,0.22));
  opacity: 0; transition: opacity 0.3s ease;
}
.hero-cta:hover::before { opacity: 1; }
.hero-cta__arrow { display: inline-block; transition: transform 0.3s var(--ease-out-expo); font-size: 1.15rem; }
.hero-cta:hover .hero-cta__arrow { transform: translateX(6px); }

/* ============================================
   VIEW: PRESENTATION STEPS
   ============================================ */
.view-pres {
  position: absolute; inset: 0; z-index: 11;
  display: flex; flex-direction: column;
  padding: 1.8rem 5vw 1.2rem;
  opacity: 0; transform: translateY(20px);
  pointer-events: none;
  transition: opacity 0.6s var(--ease-out-expo), transform 0.6s var(--ease-out-expo);
}
.view-pres.--active {
  opacity: 1; transform: translateY(0); pointer-events: all;
}

/* Step header — centered, compact */
.step-header {
  flex-shrink: 0; margin-bottom: 0.7rem; text-align: center;
  max-width: 900px; width: 100%; margin-left: auto; margin-right: auto;
}

.step-label {
  font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 0.16em;
  text-transform: uppercase; color: var(--accent); margin-bottom: 0.4rem;
  display: inline-block;
  padding: 0.2rem 0.8rem; border-radius: 100px;
  background: rgba(var(--accent-rgb),0.08); border: 1px solid rgba(var(--accent-rgb),0.15);
  opacity: 0; transform: translateY(8px);
  transition: opacity var(--dur-norm) var(--ease-out-expo), transform var(--dur-norm) var(--ease-out-expo);
}
.step-label.--in { opacity: 1; transform: translateY(0); }

.step-title {
  font-size: clamp(1.4rem, 2.8vw, 2rem); font-weight: 700;
  line-height: 1.2; letter-spacing: -0.02em; color: #fff;
  display: inline-block;
  background-image: linear-gradient(90deg, var(--accent), var(--accent-secondary));
  background-size: 0% 2px; background-repeat: no-repeat; background-position: left bottom;
  padding-bottom: 0.15em;
  opacity: 0; transform: translateY(12px);
  transition: opacity var(--dur-norm) var(--ease-out-expo), transform var(--dur-norm) var(--ease-out-expo),
              background-size 0.8s var(--ease-out-expo) 0.3s;
}
.step-title.--in { opacity: 1; transform: translateY(0); background-size: 100% 2px; }

.step-subtitle {
  font-size: clamp(0.82rem, 1.2vw, 0.95rem); font-weight: 400;
  color: var(--text-secondary); margin-top: 0.25rem; letter-spacing: 0.005em;
  opacity: 0; transform: translateY(10px);
  transition: opacity var(--dur-norm) var(--ease-out-expo) 0.08s, transform var(--dur-norm) var(--ease-out-expo) 0.08s;
}
.step-subtitle.--in { opacity: 1; transform: translateY(0); }

/* Content card */
.step-body {
  flex: 1; min-height: 0;
  display: flex; align-items: stretch; justify-content: center;
  max-width: 1100px; width: 100%; margin: 0 auto;
}
.step-body.--wide { max-width: 1400px; }
.step-body.--wide + .step-controls { max-width: 1400px; }

/* Gradient border wrapper */
.card {
  width: 100%; position: relative;
  padding: 1.5rem 2.2rem; border-radius: 20px;
  background: rgba(10,10,26,0.65);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  box-shadow: 0 8px 40px rgba(0,0,0,0.2), 0 0 0 1px rgba(255,255,255,0.06);
  transition: box-shadow var(--dur-fast) ease;
  display: grid; grid-template-columns: 1fr; gap: 1rem; align-items: start;
  overflow: hidden;
}
.card::before {
  content: ''; position: absolute; inset: -1px; border-radius: 21px; z-index: -1;
  background: linear-gradient(135deg, rgba(var(--accent-rgb),0.25), rgba(var(--accent-sec-rgb),0.1), rgba(255,255,255,0.04));
  mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  mask-composite: exclude; -webkit-mask-composite: xor;
  padding: 1px; pointer-events: none;
}
.card::after {
  content: ''; position: absolute; top: -40%; left: -25%; width: 55%; height: 55%;
  background: radial-gradient(circle, rgba(var(--accent-rgb),0.06) 0%, transparent 70%);
  pointer-events: none; z-index: 0; border-radius: 50%;
}
.card > * { position: relative; z-index: 1; }
.card.--has-img { grid-template-columns: 1.1fr 0.9fr; align-items: start; gap: 1.5rem; }

/* Image-only slides */
.card.--img-only {
  display: flex !important; flex-direction: column; align-items: center; justify-content: center;
  padding: 0.6rem 0.8rem;
  background: rgba(10,10,26,0.4);
  max-height: calc(100vh - 11rem);
}
.card.--img-only .card-text { display: none !important; }
.card.--img-only .card-img {
  width: 100%;
  padding: 0; border: none; border-radius: 0;
  box-shadow: none; background: transparent;
  clip-path: none; opacity: 0; transform: scale(0.97);
  transition: opacity 0.8s var(--ease-out-expo), transform 0.8s var(--ease-out-expo);
}
.card.--img-only .card-img.--in { opacity: 1; clip-path: none; transform: scale(1); }
.card.--img-only .card-img img {
  width: 100%; height: auto;
  max-height: calc(100vh - 14rem);
  object-fit: contain;
  border-radius: 10px;
  background: transparent;
}
.card.--img-only .card-img__caption {
  font-size: 0.65rem; color: rgba(240,240,248,0.45);
  padding-top: 0.3rem; text-align: center;
}
.card.--img-only .card-img-stack {
  width: 100%;
  display: flex; flex-direction: column; gap: 0.4rem;
  align-items: center;
}
.card.--img-only .card-img-stack .card-img {
  width: 100%; padding: 0; border: none; border-radius: 0;
  box-shadow: none; background: transparent;
  clip-path: none; opacity: 0; transform: scale(0.97);
  transition: opacity 0.8s var(--ease-out-expo), transform 0.8s var(--ease-out-expo);
}
.card.--img-only .card-img-stack .card-img.--in { opacity: 1; clip-path: none; transform: scale(1); }
.card.--img-only .card-img-stack .card-img img {
  width: 100%; height: auto;
  max-height: calc((100vh - 14rem) / 2);
  object-fit: contain;
  border-radius: 8px;
  background: transparent;
}
.card.--img-only .card-img-stack .card-img__caption {
  font-size: 0.58rem; padding-top: 0.2rem;
}

/* Body text */
.card-body {
  font-size: clamp(0.88rem, 1.2vw, 1rem);
  line-height: 1.7; color: var(--text-secondary);
  letter-spacing: 0.01em; word-spacing: 0.03em;
}
.card-body p {
  opacity: 0; transform: translateY(14px);
  transition: opacity var(--dur-norm) var(--ease-out-expo), transform var(--dur-norm) var(--ease-out-expo);
}
.card-body p.--in { opacity: 1; transform: translateY(0); }
.card-body strong, .card-text strong {
  background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
  font-weight: 700; font-size: 1.08em;
  filter: drop-shadow(0 0 8px var(--accent-glow));
}

/* Bullets — left accent bar, fit all in viewport */
.card-bullets { list-style: none; display: flex; flex-direction: column; gap: 0.2rem; }
.card-bullets li {
  display: block; position: relative;
  font-size: clamp(0.82rem, 1.05vw, 0.93rem);
  line-height: 1.65; color: rgba(240,240,248,0.78);
  letter-spacing: 0.008em; word-spacing: 0.02em;
  padding: 0.45rem 0 0.45rem 1.2rem;
  border-left: 2px solid rgba(var(--accent-rgb),0.25);
  opacity: 0; transform: translateY(12px);
  transition: opacity var(--dur-norm) var(--ease-out-expo), transform var(--dur-norm) var(--ease-out-expo),
              border-color 0.3s ease;
}
.card-bullets li.--in { opacity: 1; transform: translateY(0); }
.card-bullets li:hover { border-left-color: var(--accent); }
.card-bullets li::before {
  content: ''; position: absolute; left: -5px; top: 1em;
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent); box-shadow: 0 0 10px var(--accent-glow);
}
.card.--has-img .card-bullets { gap: 0.1rem; }
.card.--has-img .card-bullets li {
  font-size: clamp(0.78rem, 0.95vw, 0.87rem); line-height: 1.55;
  padding: 0.35rem 0 0.35rem 1rem;
}
.card-bullets li strong {
  background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
  font-weight: 700; font-size: 1.1em;
  letter-spacing: 0.01em;
  filter: drop-shadow(0 0 8px var(--accent-glow));
}

/* Footer notes */
.card-footer-notes {
  margin-top: 0.6rem; padding-top: 0.5rem;
  border-top: 1px solid rgba(255,255,255,0.06);
  display: flex; flex-direction: column; gap: 0.25rem;
}
.card-footer-note {
  font-size: 0.82rem; line-height: 1.5; color: rgba(240,240,248,0.5);
  letter-spacing: 0.008em;
  opacity: 0; transform: translateY(10px);
  transition: opacity var(--dur-norm) var(--ease-out-expo), transform var(--dur-norm) var(--ease-out-expo);
}
.card-footer-note.--in { opacity: 1; transform: translateY(0); }

/* Metrics */
.metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); gap: 0.8rem; margin-top: 0.4rem; }
.metric {
  padding: 1rem 0.8rem; border-radius: 14px; position: relative;
  background: rgba(255,255,255,0.025);
  border: 1px solid rgba(255,255,255,0.06); text-align: center;
  opacity: 0; transform: translateY(16px) scale(0.96);
  transition: opacity var(--dur-norm) var(--ease-out-expo), transform var(--dur-norm) var(--ease-out-expo),
              background var(--dur-fast) ease, border-color var(--dur-fast) ease;
}
.metric.--in { opacity: 1; transform: translateY(0) scale(1); }
.metric:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1); }
.metric__val {
  font-size: clamp(1.6rem, 3vw, 2.2rem); font-weight: 700; letter-spacing: -0.03em;
  background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  filter: drop-shadow(0 0 10px var(--accent-glow));
}
.metric__lbl { font-size: 0.72rem; color: var(--text-muted); margin-top: 0.25rem; letter-spacing: 0.04em; text-transform: uppercase; }

/* Image */
.card-img {
  border-radius: 14px; overflow: hidden; position: relative;
  opacity: 0; clip-path: inset(5% 5% 5% 5% round 14px); transform: scale(1.03);
  box-shadow: 0 6px 30px rgba(0,0,0,0.25);
  background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
  padding: 0.5rem;
  transition: opacity var(--dur-slow) var(--ease-out-expo),
              clip-path var(--dur-slow) var(--ease-out-expo),
              transform var(--dur-slow) var(--ease-out-expo);
}
.card-img.--in { opacity: 1; clip-path: inset(0 0 0 0 round 14px); transform: scale(1); }
.card-img img {
  display: block; width: 100%; height: auto; max-height: 320px;
  object-fit: contain; border-radius: 10px; cursor: pointer;
  background: #fff;
  transition: transform 0.5s var(--ease-out-expo);
}
.card-img img:hover { transform: scale(1.02); }
.card-img__caption {
  font-size: 0.7rem; color: rgba(240,240,248,0.6); text-align: center;
  padding: 0.4rem 0.2rem 0.1rem; letter-spacing: 0.02em;
  font-family: var(--font-mono);
}

/* Stacked images */
.card-img-stack {
  display: flex; flex-direction: column; gap: 0.5rem;
}
.card-img-stack .card-img img { max-height: 150px; }
.card-img-stack .card-img { padding: 0.3rem; }
.card-img-stack .card-img__caption { font-size: 0.65rem; color: rgba(240,240,248,0.6); padding: 0.3rem 0.1rem 0.05rem; }

/* Controls */
.step-controls {
  flex-shrink: 0; display: flex; align-items: center; justify-content: space-between;
  padding-top: 0.7rem; max-width: 1100px; width: 100%; margin: 0 auto;
}
.ctrl-left { display: flex; align-items: center; gap: 1rem; }
.ctrl-right { display: flex; align-items: center; gap: 0.9rem; }

.counter {
  font-family: var(--font-mono); font-size: 0.82rem; color: var(--text-muted);
  letter-spacing: 0.1em; min-width: 62px;
  padding: 0.35rem 0.8rem; border-radius: 8px;
  background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
}
.counter b { color: #fff; font-weight: 600; }

.btn {
  display: inline-flex; align-items: center; gap: 0.6rem;
  padding: 0.8rem 2rem; font-size: 0.95rem; font-weight: 600;
  font-family: var(--font-sans); border: none; border-radius: 13px;
  cursor: pointer; outline: none; position: relative; overflow: hidden;
  transition: all var(--dur-fast) var(--ease-out-expo);
}
.btn:focus-visible { box-shadow: 0 0 0 3px var(--bg-void), 0 0 0 5px var(--accent); }
.btn--pri {
  background: linear-gradient(135deg, var(--accent), #9585f7); color: #fff;
  box-shadow: 0 4px 22px var(--accent-glow);
  border: 1px solid rgba(255,255,255,0.08);
}
.btn--pri:hover { transform: translateY(-2px); box-shadow: 0 8px 35px rgba(var(--accent-rgb),0.45); }
.btn--pri:active { transform: translateY(0); }
.btn--sec {
  background: rgba(255,255,255,0.05); color: var(--text-secondary);
  border: 1px solid rgba(255,255,255,0.08);
}
.btn--sec:hover { background: rgba(255,255,255,0.1); color: #fff; transform: translateY(-1px); }
.btn--ico {
  padding: 0.7rem; border-radius: 11px; background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08); color: var(--text-secondary); font-size: 0; line-height: 0;
}
.btn--ico svg { width: 18px; height: 18px; }
.btn--ico:hover { background: rgba(255,255,255,0.1); color: #fff; }
.btn:disabled { opacity: 0.2; cursor: not-allowed; transform: none !important; box-shadow: none !important; }
.btn__arr { display: inline-block; transition: transform var(--dur-fast) var(--ease-out-expo); }
.btn--pri:hover .btn__arr { transform: translateX(4px); }
.btn--sec:hover .btn__arr--bk { transform: translateX(-4px); }

/* Toggle */
.tog-wrap { display: flex; align-items: center; gap: 0.5rem; }
.tog-lbl { font-size: 0.72rem; color: var(--text-muted); letter-spacing: 0.06em; user-select: none; }
.tog {
  position: relative; width: 38px; height: 22px;
  appearance: none; -webkit-appearance: none;
  background: rgba(255,255,255,0.08); border-radius: 11px;
  cursor: pointer; border: 1px solid rgba(255,255,255,0.06); outline: none;
  transition: background var(--dur-fast) ease, border-color var(--dur-fast) ease;
}
.tog:checked { background: var(--accent); border-color: rgba(var(--accent-rgb),0.3); }
.tog::after {
  content: ''; position: absolute; top: 3px; left: 3px; width: 14px; height: 14px;
  border-radius: 50%; background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,0.2);
  transition: transform var(--dur-fast) var(--ease-out-expo);
}
.tog:checked::after { transform: translateX(16px); }

/* ============================================
   THANK YOU SLIDE
   ============================================ */
.card.--thankyou {
  display: flex !important; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center;
  padding: 3rem 2rem;
  min-height: 50vh;
  background: transparent; box-shadow: none; border: none;
  overflow: visible;
}
.card.--thankyou::before, .card.--thankyou::after { display: none; }

.ty-orbits {
  position: absolute; top: 50%; left: 50%;
  width: min(340px, 55vw); height: min(340px, 55vw);
  transform: translate(-50%, -50%);
  pointer-events: none; z-index: 0;
}
.ty-orbits__ring {
  position: absolute; inset: 0; border-radius: 50%;
  border: 1px solid rgba(var(--accent-rgb), 0.08);
}
.ty-orbits__ring:nth-child(1) { animation: orbitSpin 35s linear infinite; }
.ty-orbits__ring:nth-child(2) { inset: 18%; border-color: rgba(var(--accent-sec-rgb), 0.06); animation: orbitSpin 25s linear infinite reverse; }
.ty-orbits__ring:nth-child(3) { inset: 38%; border-color: rgba(240,147,251,0.05); animation: orbitSpin 18s linear infinite; }
.ty-orbits__dot {
  position: absolute; width: 7px; height: 7px; border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 14px rgba(var(--accent-rgb), 0.6);
  top: -3px; left: 50%; margin-left: -3px;
}
.ty-orbits__ring:nth-child(2) .ty-orbits__dot {
  background: var(--accent-secondary);
  box-shadow: 0 0 14px rgba(var(--accent-sec-rgb), 0.6);
  width: 5px; height: 5px; top: -2px; margin-left: -2px;
}

.ty-emoji {
  font-size: 3rem; margin-bottom: 1rem; position: relative; z-index: 1;
  opacity: 0; transform: scale(0.5) translateY(20px);
  transition: opacity 0.8s var(--ease-out-expo), transform 0.8s var(--ease-out-expo);
  animation: none;
}
.ty-emoji.--in {
  opacity: 1; transform: scale(1) translateY(0);
  animation: tyEmojiFloat 3s ease-in-out 0.8s infinite alternate;
}
@keyframes tyEmojiFloat {
  0% { transform: scale(1) translateY(0); }
  100% { transform: scale(1.05) translateY(-8px); }
}

.ty-title {
  font-size: clamp(2.2rem, 5vw, 4rem); font-weight: 800;
  letter-spacing: -0.03em; line-height: 1.1;
  position: relative; z-index: 1;
  margin-bottom: 0.8rem;
  opacity: 0; transform: translateY(30px) scale(0.95); filter: blur(6px);
  transition: opacity 1s var(--ease-out-expo), transform 1s var(--ease-out-expo), filter 0.8s var(--ease-out-expo);
}
.ty-title.--in { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
.ty-title span {
  background: linear-gradient(135deg, var(--accent), var(--accent-secondary), #f093fb, var(--accent));
  background-size: 300% 100%;
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: tyGradientShift 4s ease-in-out infinite alternate;
}
@keyframes tyGradientShift {
  0%   { background-position: 0% center; }
  100% { background-position: 100% center; }
}

.ty-message {
  font-size: clamp(0.95rem, 1.5vw, 1.15rem);
  color: var(--text-secondary); line-height: 1.7;
  max-width: 540px; position: relative; z-index: 1;
  margin-bottom: 1.5rem;
  opacity: 0; transform: translateY(20px);
  transition: opacity 0.9s var(--ease-out-expo), transform 0.9s var(--ease-out-expo);

@keyframes tySparkle {
  0%   { opacity: 0; transform: scale(0.5); }
  50%  { opacity: 1; }

<script>
/* ============================================
   CONTENT DATA MODEL
   ============================================ */
const contentFlow = [
  {
    title: "Problem Statement",

      "Even a modest shift of <strong>10%</strong> of online orders to BOPIS or BORIS translates to around <strong>3,850 orders per month</strong> with zero delivery or return shipping costs",
      "This shift drives <strong>~$23,000 in savings every 30 days</strong>, or nearly <strong>~$280,000 annually</strong>, all without raising prices or compromising the customer experience"
    ],
    theme: { accent: "#00b894", accentSecondary: "#55efc4", accentGlow: "rgba(0,184,148,0.3)" }
  },
  {
    title: "End\u2011to\u2011End Architecture",
    subtitle: "BOPIS & BORIS \u2014 Omnichannel customer experience flow",
    images: [
      { src: "bopis-flow.png", alt: "BOPIS \u2014 Buy Online, Pick Up In Store (7-Step Flow)" },
      { src: "boris-flow.png", alt: "BORIS \u2014 Buy Online, Return In Store (6-Step Flow)" }
    ],
    theme: { accent: "#6c5ce7", accentSecondary: "#a29bfe", accentGlow: "rgba(108,92,231,0.3)" }
  },
  {
    type: "thankyou",
    title: "Thank You",
    subtitle: "We appreciate your time and attention",
    theme: { accent: "#7c6cf0", accentSecondary: "#00d2c6", accentGlow: "rgba(124,108,240,0.3)" }
  }
];


/* ============================================
   AI NEURAL MESH — fills entire viewport
   Scattered nodes + proximity edges + data
   pulses + mouse repulsion + click shockwaves
   ============================================ */
const AICanvas = (() => {
  const c = document.getElementById('bgCanvas'), ctx = c.getContext('2d');
  let nodes = [], edges = [], mouse = { x: -9e3, y: -9e3 }, shocks = [];
  let W, H, tick = 0, raf;

  const COLORS = {
    node1: [130, 115, 255],
    node2: [0, 210, 198],
    node3: [240, 147, 251],
    line:  [130, 115, 255],
    pulse: [200, 190, 255],
  };
  const LINK_DIST = 160;
  const NODE_COUNT = () => innerWidth < 600 ? 50 : innerWidth < 1200 ? 90 : 130;

  function resize() {
    const pg = document.getElementById('page');
    W = c.width = pg.clientWidth;
    H = c.height = pg.clientHeight;
  }

  function build() {
    nodes = []; edges = [];
    const n = NODE_COUNT();
    const cols = [COLORS.node1, COLORS.node2, COLORS.node3];
    for (let i = 0; i < n; i++) {
      nodes.push({
        bx: Math.random() * W, by: Math.random() * H,
        x: 0, y: 0,
        r: 2 + Math.random() * 3.5,
        phase: Math.random() * Math.PI * 2,
        drift: 4 + Math.random() * 6,
        spd: 0.003 + Math.random() * 0.004,
        col: cols[i % 3],
        a: 0.35 + Math.random() * 0.35,
      });
    }
    for (let i = 0; i < n; i++) {
      for (let j = i + 1; j < n; j++) {
        const dx = nodes[i].bx - nodes[j].bx, dy = nodes[i].by - nodes[j].by;
        if (dx * dx + dy * dy < LINK_DIST * LINK_DIST) {
          edges.push({ a: i, b: j, pt: -1 });
        }
      }
    }
  }

  function shock(x, y) { shocks.push({ x, y, r: 0, max: 320 }); }

  function frame() {
    ctx.clearRect(0, 0, W, H);
    tick++;

    for (let s = shocks.length - 1; s >= 0; s--) {
      shocks[s].r += 6;
      if (shocks[s].r > shocks[s].max) shocks.splice(s, 1);
    }

    for (const n of nodes) {
      n.x = n.bx + Math.sin(tick * n.spd + n.phase) * n.drift;
      n.y = n.by + Math.cos(tick * n.spd * 0.8 + n.phase * 1.4) * n.drift * 0.7;
      const dx = n.x - mouse.x, dy = n.y - mouse.y, d = Math.sqrt(dx * dx + dy * dy);
      if (d < 180 && d > 0) {
        const push = (1 - d / 180) * 22;
        n.x += (dx / d) * push;
        n.y += (dy / d) * push;
      }
      for (const s of shocks) {
        const sx = n.x - s.x, sy = n.y - s.y, sd = Math.sqrt(sx * sx + sy * sy);
        const gap = Math.abs(sd - s.r);
        if (gap < 45 && sd > 0) {
          const f = (1 - gap / 45) * (1 - s.r / s.max) * 20;
          n.x += (sx / sd) * f;
          n.y += (sy / sd) * f;
        }
      }
    }

    for (const e of edges) {
      const na = nodes[e.a], nb = nodes[e.b];
      const dx = na.x - nb.x, dy = na.y - nb.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const alpha = Math.max(0, (1 - dist / (LINK_DIST * 1.3)) * 0.12);
      if (alpha <= 0) continue;

      ctx.beginPath();
      ctx.moveTo(na.x, na.y);
      ctx.lineTo(nb.x, nb.y);
      ctx.strokeStyle = `rgba(${COLORS.line[0]},${COLORS.line[1]},${COLORS.line[2]},${alpha})`;
      ctx.lineWidth = 0.8;
      ctx.stroke();

      if (e.pt < 0 && Math.random() < 0.003) e.pt = 0;
      if (e.pt >= 0) {
        e.pt += 0.018;
        if (e.pt > 1) { e.pt = -1; }
        else {
          const px = na.x + (nb.x - na.x) * e.pt;
          const py = na.y + (nb.y - na.y) * e.pt;
          const pa = 0.8 * (1 - Math.abs(e.pt - 0.5) * 2);
          ctx.beginPath();
          ctx.arc(px, py, 2.5, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(${COLORS.pulse[0]},${COLORS.pulse[1]},${COLORS.pulse[2]},${pa})`;
          ctx.fill();
        }
      }
    }

    for (const n of nodes) {
      const glow = 0.3 + Math.sin(tick * 0.018 + n.phase) * 0.15;
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r + 5, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${n.col[0]},${n.col[1]},${n.col[2]},${glow * 0.1})`;
      ctx.fill();
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${n.col[0]},${n.col[1]},${n.col[2]},${n.a})`;
      ctx.fill();
    }

    raf = requestAnimationFrame(frame);
  }

  function init() {
    resize(); build(); frame();
    addEventListener('resize', () => { resize(); build(); });
    addEventListener('mousemove', e => {
      const r = c.getBoundingClientRect();
      mouse.x = e.clientX - r.left;
      mouse.y = e.clientY - r.top;
    });
  }
  return { init, shock };
})();


/* ============================================
   CLICK RIPPLES
   ============================================ */
const Ripples = (() => {
  const layer = document.getElementById('rippleLayer'), page = document.getElementById('page');
  function go(cx, cy) {
    const r = page.getBoundingClientRect(), x = cx-r.left, y = cy-r.top;
    mk(x,y,500,1.4,'ripple-bubble--ring'); mk(x,y,350,1.2,'ripple-bubble--glow'); mk(x,y,0,0,'ripple-bubble--core');
    AICanvas.shock(x, y);
  }
  function mk(x,y,sz,dur,cls) {
    const d = document.createElement('div'); d.className = 'ripple-bubble '+cls;
    d.style.left = x+'px'; d.style.top = y+'px';
    if (sz) { d.style.width = sz+'px'; d.style.height = sz+'px'; }
    if (dur) d.style.animationDuration = dur+'s';
    layer.appendChild(d); d.addEventListener('animationend', () => d.remove());
  }
  function init() {
    page.addEventListener('click', e => {
      if (e.target.closest('.btn') || e.target.closest('.hero-cta') || e.target.closest('.tog') || e.target.closest('.lightbox')) return;
      go(e.clientX, e.clientY);
    });
    page.addEventListener('touchstart', e => {
      if (e.target.closest('.btn') || e.target.closest('.hero-cta')) return;
      go(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: true });
  }
  return { init };
})();


/* ============================================
   CURSOR LIGHT
   ============================================ */
const CLight = (() => {
  const el = document.getElementById('cursorLight'), pg = document.getElementById('page');
  let tx=0, ty=0, cx=0, cy=0, on=false, raf;
  function init() {
    if (innerWidth < 769 || matchMedia('(prefers-reduced-motion:reduce)').matches) return;
    pg.addEventListener('mousemove', e => { const r = pg.getBoundingClientRect(); tx = e.clientX-r.left; ty = e.clientY-r.top; if (!on) { on=true; el.classList.add('--on'); } });
    pg.addEventListener('mouseleave', () => { on=false; el.classList.remove('--on'); });
    (function tick() { cx+=(tx-cx)*0.08; cy+=(ty-cy)*0.08; el.style.transform = `translate(${cx-190}px,${cy-190}px)`; raf=requestAnimationFrame(tick); })();
  }
  return { init };
})();


/* ============================================
   3D TILT PARALLAX (hero content)
   ============================================ */
const Parallax = (() => {
  const el = document.getElementById('heroInner');
  let tx=0,ty=0,cx=0,cy=0;
  function init() {
    if (matchMedia('(prefers-reduced-motion:reduce)').matches || innerWidth < 769) return;
    addEventListener('mousemove', e => {
      tx = (e.clientX-innerWidth/2)/(innerWidth/2);
      ty = (e.clientY-innerHeight/2)/(innerHeight/2);
    });
    (function tick() {
      cx+=(tx-cx)*0.05; cy+=(ty-cy)*0.05;
      el.style.transform = `translate(${cx*-10}px,${cy*-6}px) rotateY(${cx*2.5}deg) rotateX(${cy*-2}deg)`;
      requestAnimationFrame(tick);
    })();
  }
  return { init };
})();

/* ============================================
   CURSOR TRAIL (ghost circles)
   ============================================ */
const CursorTrail = (() => {
  const pg = document.getElementById('page');
  const trails = [];
  const COUNT = 4;
  function init() {
    if (innerWidth < 769 || matchMedia('(prefers-reduced-motion:reduce)').matches) return;
    for (let i = 0; i < COUNT; i++) {
      const d = document.createElement('div');
      d.style.cssText = `position:absolute;width:${12-i*2}px;height:${12-i*2}px;border-radius:50%;pointer-events:none;z-index:4;opacity:0;background:rgba(var(--accent-rgb),${0.3-i*0.06});box-shadow:0 0 ${10-i*2}px rgba(var(--accent-rgb),${0.2-i*0.04});will-change:transform;transition:opacity 0.4s ease;`;
      pg.appendChild(d);
      trails.push({ el: d, x: 0, y: 0 });
    }
    let mx = 0, my = 0;
    pg.addEventListener('mousemove', e => {
      const r = pg.getBoundingClientRect();
      mx = e.clientX - r.left; my = e.clientY - r.top;
      trails.forEach(t => { t.el.style.opacity = '1'; });
    });
    pg.addEventListener('mouseleave', () => {
      trails.forEach(t => { t.el.style.opacity = '0'; });
    });
    (function tick() {
      let px = mx, py = my;
      trails.forEach((t, i) => {
        const speed = 0.12 - i * 0.02;
        t.x += (px - t.x) * speed;
        t.y += (py - t.y) * speed;
        const sz = (12 - i * 2) / 2;
        t.el.style.transform = `translate(${t.x - sz}px, ${t.y - sz}px)`;
        px = t.x; py = t.y;
      });
      requestAnimationFrame(tick);
    })();
  }
  return { init };
})();


/* ============================================
   HERO REVEAL SEQUENCE
   ============================================ */
const HeroReveal = (() => {
  const TITLE = "Converse AI Promptathon 2026";

  function split(txt, el) {
    el.innerHTML = '';
    return [...txt].map(ch => {
      const s = document.createElement('span');
      s.textContent = ch === ' ' ? '\u00A0' : ch;
      s.className = 'char';
      if (ch === ' ') s.style.width = '0.3em';
      el.appendChild(s); return s;
    });
  }

  function spawnSparkles() {
    const container = document.getElementById('heroSparkles');
    for (let i = 0; i < 18; i++) {
      const s = document.createElement('div');
      s.className = 'hero-sparkle';
      s.style.left = Math.random() * 100 + '%';
      s.style.bottom = -(Math.random() * 20) + '%';
      s.style.setProperty('--dur', (6 + Math.random() * 8) + 's');
      s.style.animationDelay = Math.random() * 10 + 's';
      container.appendChild(s);
    }
  }

  function go() {
    const cursor = document.getElementById('heroCursor');
    const border = document.getElementById('heroBorder');
    const shimmer = document.getElementById('heroShimmer');
    const scanline = document.getElementById('heroScanline');
    const circuits = document.getElementById('heroCircuits');
    const chars = split(TITLE, document.getElementById('tLine1'));
    let t = 0;

    spawnSparkles();

    setTimeout(() => scanline.classList.add('--go'), t);
    setTimeout(() => document.getElementById('heroBadge').classList.add('--in'), t); t += 700;
    setTimeout(() => cursor.classList.add('--blink'), t);
    chars.forEach((ch, i) => setTimeout(() => ch.classList.add('--in'), t + i * 35));
    t += chars.length * 35 + 300;
    setTimeout(() => { cursor.classList.remove('--blink'); cursor.classList.add('--off'); }, t);
    setTimeout(() => { border.classList.add('--in'); shimmer.classList.add('--sweep'); }, t); t += 200;
    setTimeout(() => document.getElementById('heroSub').classList.add('--in'), t); t += 300;
    setTimeout(() => document.getElementById('heroSep').classList.add('--in'), t); t += 250;
    setTimeout(() => {
      document.getElementById('heroTeam').classList.add('--in');
      circuits.classList.add('--in');
    }, t); t += 200;
    setTimeout(() => document.getElementById('teamName1').classList.add('--in'), t); t += 150;
    setTimeout(() => document.getElementById('teamName2').classList.add('--in'), t); t += 250;
    setTimeout(() => document.getElementById('beginBtn').classList.add('--in'), t);
  }
  return { go };
})();


/* ============================================
   PRESENTATION ENGINE
   ============================================ */
const Engine = (() => {
  let idx = -1, busy = false, autoTmr = null;
  const $ = s => document.querySelector(s);
  const viewHero = $('#viewHero'), viewPres = $('#viewPres');
  const sLabel = $('#sLabel'), sTitle = $('#sTitle'), sSub = $('#sSub'), sCard = $('#sCard');
  const counter = $('#counter'), prevBtn = $('#prevBtn'), nextBtn = $('#nextBtn');
  const replayBtn = $('#replayBtn'), autoTog = $('#autoTog');
  const pBar = $('#progressBar'), pFill = $('#progressFill');
  const lightbox = $('#lightbox'), lbImg = $('#lbImg');

  function showHero() {
    viewHero.classList.remove('--hidden');
    viewPres.classList.remove('--active');
    pBar.classList.remove('--show');
    idx = -1;
  }

  function theme(step) {
    const th = step.theme || {};
    document.documentElement.style.setProperty('--accent', th.accent || '#7c6cf0');
    document.documentElement.style.setProperty('--accent-secondary', th.accentSecondary || '#00d2c6');
    document.documentElement.style.setProperty('--accent-glow', th.accentGlow || 'rgba(124,108,240,0.3)');
  }

  function tyHTML() {
    return `
      <div class="ty-sparkles" id="tySparkles"></div>
      <div class="ty-orbits">
        <div class="ty-orbits__ring"><div class="ty-orbits__dot"></div></div>
        <div class="ty-orbits__ring"><div class="ty-orbits__dot"></div></div>
        <div class="ty-orbits__ring"></div>
      </div>
      <div class="ty-emoji">\u{1F680}</div>
      <div class="ty-title"><span>Thank You!</span></div>
      <p class="ty-message">
        We appreciate your time reviewing our <em>BOPIS & BORIS</em> solution.<br>
        Together, let\u2019s transform the <em>Converse</em> omnichannel experience.
      </p>
      <div class="ty-sep"></div>
      <div class="ty-team">
        <div class="ty-member">
          <div class="ty-member__icon">\u{1F468}\u200D\u{1F4BB}</div>
          <div class="ty-member__name">Manjunath Pujar</div>
        </div>
        <div class="ty-member__sep"></div>
        <div class="ty-member">
          <div class="ty-member__icon">\u{1F469}\u200D\u{1F4BB}</div>
          <div class="ty-member__name">Reethu Varughese</div>
        </div>
      </div>`;
  }

  function tyAnimIn() {
    const container = document.getElementById('tySparkles');
    if (container) {
      for (let i = 0; i < 14; i++) {
        const s = document.createElement('div');
        s.className = 'ty-sparkle';
        const size = 3 + Math.random() * 5;
        const colors = ['var(--accent)', 'var(--accent-secondary)', 'rgba(240,147,251,0.5)'];
        s.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;background:${colors[i%3]};box-shadow:0 0 ${size*2}px ${colors[i%3]};--dur:${2+Math.random()*3}s;animation-delay:${Math.random()*3}s;`;
        container.appendChild(s);
      }
    }
    let d = 100;
    const q = s => sCard.querySelector(s);
    const qa = s => sCard.querySelectorAll(s);
    setTimeout(() => { const e = q('.ty-emoji'); if(e) e.classList.add('--in'); }, d); d += 250;
    setTimeout(() => { const e = q('.ty-title'); if(e) e.classList.add('--in'); }, d); d += 300;
    setTimeout(() => { const e = q('.ty-message'); if(e) e.classList.add('--in'); }, d); d += 250;
    setTimeout(() => { const e = q('.ty-sep'); if(e) e.classList.add('--in'); }, d); d += 200;
    setTimeout(() => { const e = q('.ty-team'); if(e) e.classList.add('--in'); }, d);
  }

  function html(step) {
    if (step.type === 'thankyou') return tyHTML();
    const hasImg = step.image || step.images;
    let h = '<div class="card-text">';
    if (step.body) {
      if (Array.isArray(step.body)) { h += '<ul class="card-bullets">'; step.body.forEach(b => h += `<li>${b}</li>`); h += '</ul>'; }
      else h += `<div class="card-body"><p>${step.body}</p></div>`;
    }
    if (step.metrics) { h += '<div class="metrics">'; step.metrics.forEach(m => { const pre = m.prefix||''; h += `<div class="metric"><div class="metric__val" data-v="${m.value}" data-s="${m.suffix||''}" data-p="${pre}">${pre}0${m.suffix||''}</div><div class="metric__lbl">${m.label}</div></div>`; }); h += '</div>'; }
    if (step.footerNotes) {
      h += '<div class="card-footer-notes">';
      step.footerNotes.forEach(n => h += `<p class="card-footer-note">\u2705 ${n}</p>`);
      h += '</div>';
    }
    h += '</div>';
    if (step.images) {
      h += '<div class="card-img-stack">';
      step.images.forEach(img => {
        h += `<div class="card-img"><img src="${img.src}" alt="${img.alt}" loading="lazy"/>${img.alt ? `<div class="card-img__caption">${img.alt}</div>` : ''}</div>`;
      });
      h += '</div>';
    } else if (step.image) {
      h += `<div class="card-img"><img src="${step.image.src}" alt="${step.image.alt}" loading="lazy"/>${step.image.alt ? `<div class="card-img__caption">${step.image.alt}</div>` : ''}</div>`;
    }
    return h;
  }

  function animIn() {
    if (contentFlow[idx] && contentFlow[idx].type === 'thankyou') { tyAnimIn(); return; }
    const S = 70; let d = 40;
    sLabel.classList.add('--in');
    setTimeout(() => sTitle.classList.add('--in'), d); d += 100;
    if (sSub.textContent) { setTimeout(() => sSub.classList.add('--in'), d); d += 100; } d += 80;
    sCard.querySelectorAll('.card-body p').forEach(p => { setTimeout(() => p.classList.add('--in'), d); d += S; });
    sCard.querySelectorAll('.card-bullets li').forEach(li => { setTimeout(() => li.classList.add('--in'), d); d += S; });
    sCard.querySelectorAll('.metric').forEach(m => { setTimeout(() => { m.classList.add('--in'); const v = m.querySelector('.metric__val'); if (v) countUp(v); }, d); d += 100; });
    sCard.querySelectorAll('.card-footer-note').forEach(n => { setTimeout(() => n.classList.add('--in'), d); d += 80; });
    sCard.querySelectorAll('.card-img').forEach(img => { setTimeout(() => img.classList.add('--in'), d); d += 150; });
  }

  function countUp(el) {
    const tgt = parseFloat(el.dataset.v), suf = el.dataset.s || '', pre = el.dataset.p || '', dec = tgt%1!==0, dur = 1100, st = performance.now();
    const ease = t => 1-Math.pow(1-t,4);
    const fmt = v => { if (v >= 1000) return pre + v.toLocaleString() + suf; return pre + (dec ? v.toFixed(1) : Math.round(v)) + suf; };
    (function f(now) { const p = Math.min((now-st)/dur,1); el.textContent = fmt(ease(p)*tgt); if (p<1) requestAnimationFrame(f); })(st);
  }

  function animExit() {
    return new Promise(r => {
      viewPres.classList.add('--exit');
      setTimeout(() => { viewPres.classList.remove('--exit'); r(); }, 300);
    });
  }

  function render(skip) {
    const step = contentFlow[idx];
    const isTY = step.type === 'thankyou';
    const isImgOnly = (step.image || step.images) && !step.body && !step.metrics;

    sLabel.textContent = isTY ? '' : `Step ${idx+1}`; sLabel.className = 'step-label';
    sTitle.textContent = isTY ? '' : step.title; sTitle.className = 'step-title';
    sSub.textContent = isTY ? '' : (step.subtitle || ''); sSub.className = 'step-subtitle';
    document.querySelector('.step-header').style.display = isTY ? 'none' : '';

    sCard.className = 'card';
    if (isTY) sCard.classList.add('--thankyou');
    if (step.image || step.images) sCard.classList.add('--has-img');
    if (isImgOnly) sCard.classList.add('--img-only');
    sCard.parentElement.classList.toggle('--wide', !!(isImgOnly || isTY));
    sCard.innerHTML = html(step);
    theme(step);
    pFill.style.width = ((idx+1)/contentFlow.length*100)+'%';
    counter.innerHTML = `<b>${String(idx+1).padStart(2,'0')}</b> / ${String(contentFlow.length).padStart(2,'0')}`;
    prevBtn.disabled = false;
    nextBtn.disabled = idx === contentFlow.length-1;
    sCard.querySelectorAll('.card-img img').forEach(imgEl => {
      imgEl.addEventListener('click', () => { lbImg.src = imgEl.src; lbImg.alt = imgEl.alt; lightbox.classList.add('--open'); });
    });
    if (!skip) requestAnimationFrame(() => requestAnimationFrame(() => animIn()));
    else {
      sLabel.classList.add('--in'); sTitle.classList.add('--in');
      if (step.subtitle) sSub.classList.add('--in');
      sCard.querySelectorAll('.card-body p,.card-bullets li,.metric,.card-img,.card-footer-note').forEach(e => e.classList.add('--in'));
      sCard.querySelectorAll('.metric__val').forEach(e => { const v = parseFloat(e.dataset.v); e.textContent = (e.dataset.p||'') + (v>=1000?v.toLocaleString():v) + (e.dataset.s||''); });
    }
  }

  async function goTo(i) {
    if (busy || i < 0 || i >= contentFlow.length || i === idx) return;
    busy = true;
    if (idx >= 0) await animExit();
    idx = i; render(false);
    setTimeout(() => { busy = false; }, 500);
    resetAuto();
  }

  function begin() {
    viewHero.classList.add('--hidden');
    setTimeout(() => {
      viewPres.classList.add('--active');
      pBar.classList.add('--show');
      idx = 0; render(false);
    }, 350);
  }

  function next() {
    if (idx < contentFlow.length-1) goTo(idx+1);
  }
  function prev() {
    if (idx === 0) showHero();
    else if (idx > 0) goTo(idx-1);
  }
  function replay() {
    if (busy) return; busy = true;
    animExit().then(() => { render(false); setTimeout(() => { busy = false; }, 500); });
  }
  function resetAuto() {
    clearTimeout(autoTmr);
    if (autoTog.checked && idx < contentFlow.length-1) autoTmr = setTimeout(next, 6000);
  }

  function init() {
    document.getElementById('beginBtn').addEventListener('click', begin);
    nextBtn.addEventListener('click', next);
    prevBtn.addEventListener('click', prev);
    replayBtn.addEventListener('click', replay);
    autoTog.addEventListener('change', () => { if (autoTog.checked) resetAuto(); else clearTimeout(autoTmr); });
    lightbox.addEventListener('click', () => lightbox.classList.remove('--open'));
    lightbox.querySelector('.lightbox__x').addEventListener('click', e => { e.stopPropagation(); lightbox.classList.remove('--open'); });
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); if (idx === -1) begin(); else next(); }
      else if (e.key === 'ArrowLeft') { e.preventDefault(); prev(); }
      else if (e.key === 'Escape') lightbox.classList.remove('--open');
      else if (e.key === 'r' || e.key === 'R') { if (idx >= 0) replay(); }
    });
  }
  return { init };
})();


/* ============================================
   BOOT
   ============================================ */
document.addEventListener('DOMContentLoaded', () => {
  AICanvas.init();
  CLight.init();
  CursorTrail.init();
  Parallax.init();
  Ripples.init();
  Engine.init();
  setTimeout(() => HeroReveal.go(), 300);
});
</script>
